name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Create release archive
        run: |
          cd dist
          zip -j ../hxighlighter-${{ github.ref_name }}.zip \
            hxighlighter_*.js \
            hxighlighter_*.css
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            hxighlighter-${{ github.ref_name }}.zip
            dist/hxighlighter_*.js
            dist/hxighlighter_*.css
